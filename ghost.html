<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Diagnostic Tool v6.0</title>
    <style>
        body {
            background-color: #f0f0f0;
            color: #333;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 15px;
            font-size: 14px;
            overflow: hidden;
            touch-action: none;
        }
        #login-section {
            max-width: 320px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border: 1px solid #ccc;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        #admin-controls { display: none; height: 100vh; flex-direction: column; }
        
        .header { border-bottom: 2px solid #ddd; padding-bottom: 8px; margin-bottom: 12px; }
        .status { font-weight: bold; transition: color 0.3s; }
        
        .log-container {
            background: #111;
            color: #0f0;
            border: 1px solid #333;
            padding: 8px;
            height: 120px;
            overflow-y: scroll;
            margin-bottom: 12px;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            border-radius: 4px;
        }
        
        #live-pad {
            position: relative;
            width: 100%;
            aspect-ratio: 1000 / 650;
            background: #fff;
            border: 2px dashed #999;
            margin-bottom: 12px;
            border-radius: 6px;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #999;
            font-weight: bold;
            text-transform: uppercase;
            overflow: hidden;
        }
        #cursor-preview {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #ff4444;
            border-radius: 50%;
            pointer-events: none;
            display: none;
        }

        .input-group { display: flex; gap: 8px; margin-bottom: 12px; }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
        }
        button {
            padding: 10px 15px;
            background: #444;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .btn-group { display: flex; gap: 8px; }
        .btn-group button { flex: 1; }
        
        .debug-info {
            font-size: 10px;
            color: #666;
            margin-top: 10px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div id="login-section">
        <h3>STATION AUTH v6</h3>
        <p>Enter 4-Digit Board Code:</p>
        <input type="text" id="passcode" placeholder="0000" maxlength="4" inputmode="numeric">
        <button onclick="checkAuth()" style="width:100%; margin-top:10px;">Establish Tunnel</button>
    </div>

    <div id="admin-controls">
        <div class="header">
            <strong>Diagnostic Tool v6.0 (Relay Enabled)</strong><br>
            Link Status: <span id="conn-status" style="color:red;">Searching...</span>
        </div>

        <div class="log-container" id="log">
            [SYS] Initializing...
        </div>

        <div id="live-pad">
            Possession Grid
            <div id="cursor-preview"></div>
        </div>

        <div class="input-group">
            <input type="text" id="target-word" placeholder="Sequence..." disabled>
            <button onclick="sendCommand()" id="send-btn" disabled>Spell</button>
        </div>

        <div class="btn-group">
            <button onclick="sendQuick('YES')" class="ctrl-btn" disabled>YES</button>
            <button onclick="sendQuick('NO')" class="ctrl-btn" disabled>NO</button>
            <button onclick="sendQuick(null)" class="ctrl-btn" disabled style="background:#888;">RESET</button>
        </div>
        
        <div class="debug-info" id="debug-txt">ICE: Checking...</div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const ID_PREFIX = "spirit-sync-";
        const PEER_CONFIG = {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    { urls: 'stun:stun3.l.google.com:19302' },
                    { urls: 'stun:stun4.l.google.com:19302' },
                    { urls: 'stun:global.stun.twilio.com:3478?transport=udp' }
                ]
            }
        };

        let peer, boardConn, targetPin;
        let lastPing = 0;
        let retryCount = 0;

        const log = (msg) => {
            const l = document.getElementById('log');
            l.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
            l.scrollTop = l.scrollHeight;
        };

        const updateStatus = (text, color) => {
            const s = document.getElementById('conn-status');
            s.innerText = text;
            s.style.color = color;
        };

        const setControlsEnabled = (enabled) => {
            document.querySelectorAll('button, input').forEach(el => {
                if (el.id !== 'passcode') el.disabled = !enabled;
            });
            document.querySelectorAll('.ctrl-btn').forEach(btn => btn.disabled = !enabled);
        };

        window.checkAuth = () => {
            const code = document.getElementById('passcode').value.trim();
            if(code.length === 4) {
                targetPin = code;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-controls').style.display = 'flex';
                initPeer();
            } else { alert("Enter 4 digits."); }
        };

        const initPeer = () => {
            if (peer) peer.destroy();
            
            updateStatus("NEGOTIATING...", "orange");
            log(`Starting Tunnel Attempt #${++retryCount}...`);
            
            peer = new Peer(null, PEER_CONFIG); 
            
            peer.on('open', (id) => {
                const targetRoom = `${ID_PREFIX}${targetPin}`;
                log(`Local Station Ready.`);
                log(`Boring hole to: ${targetRoom}`);
                
                attemptConnection(targetRoom);
            });
            
            peer.on('error', (err) => {
                log("!! Signal Error: " + err.type);
                if (err.type === 'peer-unavailable') {
                    log("Board not found. Check code.");
                } else {
                    setTimeout(initPeer, 3000); // Retry on fatal error
                }
            });
        };

        const attemptConnection = (targetRoom) => {
            boardConn = peer.connect(targetRoom, {
                reliable: false, // Better for high-frequency live control
                connectionId: 'ghost-' + Date.now()
            });
            
            const timeout = setTimeout(() => {
                if (!boardConn.open) {
                    log("Handshake timeout. Retrying...");
                    attemptConnection(targetRoom);
                }
            }, 6000);

            boardConn.on('open', () => {
                clearTimeout(timeout);
                updateStatus("SYNCED", "green");
                log("Spirit Link Fixed. Live mode on.");
                setControlsEnabled(true);
                startHeartbeat();
            });

            boardConn.on('data', (data) => {
                if (data === 'pong') {
                    lastPing = Date.now();
                }
            });

            boardConn.on('close', () => {
                updateStatus("LINK LOST", "red");
                log("Connection dropped. Healing...");
                setControlsEnabled(false);
                setTimeout(initPeer, 1000);
            });
        };

        const startHeartbeat = () => {
            lastPing = Date.now();
            const hb = setInterval(() => {
                if (!boardConn || !boardConn.open) {
                    clearInterval(hb);
                    return;
                }
                boardConn.send('ping');
                if (Date.now() - lastPing > 5000) {
                    log("Link unstable. Retrying handshake...");
                    clearInterval(hb);
                    attemptConnection(`${ID_PREFIX}${targetPin}`);
                }
            }, 2000);
        };

        // --- Live Control Logic ---
        const pad = document.getElementById('live-pad');
        const cursor = document.getElementById('cursor-preview');
        
        const handleMove = (e) => {
            if (!boardConn || !boardConn.open) return;
            const rect = pad.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            const x = (touch.clientX - rect.left) / rect.width;
            const y = (touch.clientY - rect.top) / rect.height;
            const finalX = Math.max(0, Math.min(1, x));
            const finalY = Math.max(0, Math.min(1, y));
            
            cursor.style.display = 'block';
            cursor.style.left = `${finalX * 100}%`;
            cursor.style.top = `${finalY * 100}%`;
            
            boardConn.send({
                type: 'live',
                x: finalX,
                y: finalY,
                rot: (x - 0.5) * 40
            });
        };

        pad.addEventListener('mousemove', handleMove);
        pad.addEventListener('touchstart', (e) => { e.preventDefault(); handleMove(e); }, {passive:false});
        pad.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, {passive:false});
        pad.addEventListener('touchend', () => { cursor.style.display = 'none'; });

        window.sendCommand = () => {
            const word = document.getElementById('target-word').value.trim().toUpperCase();
            if(!word || !boardConn) return;
            boardConn.send({ text: word });
            log(`Spell: ${word}`);
            document.getElementById('target-word').value = "";
        };

        window.sendQuick = (val) => {
            if (!boardConn) return;
            if (val === null) {
                boardConn.send(null);
                log("Reset Signal.");
            } else {
                boardConn.send({ text: val });
                log(`Quick: ${val}`);
            }
        };

        document.getElementById('target-word').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') window.sendCommand();
        });
    </script>
</body>
</html>
