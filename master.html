<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spirit Radar | Global Master Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0a0c;
            --glow: rgba(212, 175, 55, 0.3);
        }

        body {
            margin: 0;
            background-color: var(--dark);
            color: #e0e0e0;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0c 100%);
        }

        header {
            padding: 40px;
            text-align: center;
        }

        h1 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 2.5rem;
            color: var(--gold);
            margin: 0;
            text-shadow: 0 0 20px var(--glow);
            letter-spacing: 4px;
        }

        .radar-status {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main-container {
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            padding: 20px;
        }

        /* Active Rooms List */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            padding: 25px;
        }

        .card h2 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.2rem;
            margin-top: 0;
            color: var(--gold);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 10px;
        }

        .room-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .room-item {
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .room-item:hover {
            background: var(--gold);
            color: black;
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--glow);
        }

        .room-item.active {
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .room-pin {
            font-size: 1.5rem;
            font-weight: bold;
            display: block;
        }

        .room-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.7;
        }

        /* Global Control Panel */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .pad-container {
            aspect-ratio: 1000 / 650;
            background: rgba(0, 0, 0, 0.7);
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('wood_bg.png');
            background-size: cover;
            border: 2px solid var(--gold);
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            touch-action: none;
            box-shadow: inset 0 0 30px #000;
        }

        #live-pad {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #live-pad svg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 90%;
            opacity: 0.4;
            pointer-events: none;
        }

        #live-pad text, #live-pad path {
            fill: #fff !important;
            stroke: #fff !important;
        }

        #cursor {
            position: absolute;
            width: 25px;
            height: 25px;
            background: rgba(212, 175, 55, 0.2);
            border: 2px solid var(--gold);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 15px var(--gold);
            display: none;
            z-index: 10;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 12px;
            color: white;
            border-radius: 8px;
            font-family: inherit;
        }

        .btn {
            padding: 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-family: 'Cinzel Decorative', cursive;
            transition: 0.3s;
        }

        .btn-gold {
            background: var(--gold);
            color: black;
        }

        .btn-gold:hover {
            box-shadow: 0 0 20px var(--glow);
            transform: translateY(-2px);
        }

        .btn-red {
            background: #8b0000;
            color: white;
            margin-top: 20px;
        }

        .btn-red:hover {
            background: #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        .global-badge {
            display: inline-block;
            padding: 40x 10px;
            background: #ff0000;
            color: white;
            font-size: 0.6rem;
            border-radius: 4px;
            margin-bottom: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @media (max-width: 800px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        /* Debug & Security Overlay */
        #security-warning {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: #8b0000;
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 0.8rem;
            z-index: 9999;
            display: none;
            border-bottom: 2px solid white;
            font-family: monospace;
        }

        #debug-console {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 300px;
            height: 200px;
            background: rgba(0,0,0,0.9);
            border: 1px solid #444;
            color: #0f0;
            font-family: monospace;
            font-size: 0.7rem;
            padding: 10px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            pointer-events: none;
            border-radius: 5px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="security-warning">
        ⚠️ INSECURE CONTEXT: WebRTC/Audio may be blocked. Use http://localhost or https://
    </div>
    <div id="debug-console"></div>
    <header>
        <h1>SPIRIT RADAR</h1>
        <div class="radar-status" id="status">Scanning the Void...</div>
    </header>

    <div class="main-container">
        <!-- Active Sessions Registry -->
        <div class="card">
            <h2>Active Board Registry</h2>
            <div class="room-grid" id="room-list">
                <!-- Rooms will appear here -->
            </div>
            <div id="no-rooms" style="text-align: center; padding: 40px; opacity: 0.3;">
                No active spirits detected...
            </div>
        </div>

        <!-- Master Controller -->
        <div class="controls">
            <div class="card">
                <div id="target-label" style="color: var(--gold); font-size: 0.8rem; margin-bottom: 10px;">TARGET: NONE SELECTED</div>
                
                <div class="pad-container">
                    <div id="live-pad">
                        <svg viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <path id="curveAM" d="M 120 300 A 450 300 0 0 1 880 300" fill="transparent" />
                                <path id="curveNZ" d="M 220 400 A 350 200 0 0 1 780 400" fill="transparent" />
                                <path id="line10" d="M 150 480 L 850 480" fill="transparent" />
                                <path id="curveGoodbye" d="M 250 580 A 250 50 0 0 0 750 580" fill="transparent"/>
                            </defs>
                            <g opacity="0.8">
                                <text x="500" y="90" text-anchor="middle" font-size="60" font-family="serif" font-weight="bold">OUIJA</text>
                                <text x="220" y="160" text-anchor="middle" font-size="40" font-family="serif" font-weight="bold">YES</text>
                                <text x="780" y="160" text-anchor="middle" font-size="40" font-family="serif" font-weight="bold">NO</text>
                                <text font-size="45" text-anchor="middle" font-family="serif" font-weight="bold">
                                    <textPath href="#curveAM" startOffset="50%">A B C D E F G H I J K L M N</textPath>
                                </text>
                                <text font-size="45" text-anchor="middle" font-family="serif" font-weight="bold">
                                    <textPath href="#curveNZ" startOffset="50%">O P Q R S T U V W X Y Z</textPath>
                                </text>
                                <text font-size="45" text-anchor="middle" font-family="serif" font-weight="bold">
                                    <textPath href="#line10" startOffset="50%">1 2 3 4 5 6 7 8 9 0</textPath>
                                </text>
                                <text font-size="40" text-anchor="middle" font-family="serif" font-weight="bold">
                                    <textPath href="#curveGoodbye" startOffset="50%">GOODBYE</textPath>
                                </text>
                            </g>
                        </svg>
                    </div>
                    <div id="cursor"></div>
                </div>

                <div class="input-group" style="margin-top: 20px;">
                    <input type="text" id="spell-input" placeholder="Enter message...">
                    <button class="btn btn-gold" onclick="sendSpell()">Spell Message</button>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-gold" style="flex: 1;" onclick="sendQuick('YES')">YES</button>
                        <button class="btn btn-gold" style="flex: 1;" onclick="sendQuick('NO')">NO</button>
                    </div>
                </div>

                <button class="btn btn-red" onclick="massPossession()">☠️ MASS POSSESSION ☠️</button>
                <div style="font-size: 0.6rem; text-align: center; margin-top: 10px; opacity: 0.4;">WARNING: Controls ALL boards simultaneously</div>
                
                <button id="btn-listen" class="btn" style="background: #222; color: #555; margin-top: 15px; cursor: not-allowed; opacity: 0.5; pointer-events: none;" onclick="startListening()">🎤 Acquire Target to Listen</button>
                <button id="btn-reconnect" class="btn" style="background: #444; color: #aaa; margin-top: 5px; font-size: 0.7rem; display: none;" onclick="resetWebRTC(); startListening();">🔄 Re-center Spiritual Link</button>
                <audio id="covert-audio" autoplay style="position:fixed; bottom:0; opacity:0; pointer-events:none;"></audio>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        // Connect to the server - try current origin, fallback to Render
        const socket = (window.location.protocol.startsWith('http')) 
            ? io() 
            : io('https://ouijo-board.onrender.com');
        let selectedPin = null;

        socket.on('connect', () => {
            document.getElementById('status').innerText = "RADAR ONLINE - LISTENING...";
            socket.emit('request_radar');
            logRTC("Socket Connected to Relay.");
        });

        const logRTC = (msg) => {
            const consoleEl = document.getElementById('debug-console');
            consoleEl.style.display = 'block';
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            consoleEl.appendChild(entry);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        };

        if (!window.isSecureContext || window.location.protocol === 'file:') {
            document.getElementById('security-warning').style.display = 'block';
            logRTC("WARNING: Insecure context detected!");
        }

        socket.on('radar_update', (rooms) => {
            const list = document.getElementById('room-list');
            const placeholder = document.getElementById('no-rooms');
            list.innerHTML = '';
            
            if (rooms.length === 0) {
                placeholder.style.display = 'block';
            } else {
                placeholder.style.display = 'none';
                const lastPin = localStorage.getItem('last_ouija_room');
                
                rooms.forEach(pin => {
                    const item = document.createElement('div');
                    item.className = `room-item ${selectedPin === pin ? 'active' : ''}`;
                    item.onclick = () => selectRoom(pin, item);
                    item.innerHTML = `
                        <span class="room-pin">${pin}</span>
                        <span class="room-label">Board Active</span>
                    `;
                    list.appendChild(item);
                });

                if (!selectedPin) {
                    if (rooms.includes(lastPin)) {
                        const targetEl = Array.from(list.children).find(el => el.innerHTML.includes(lastPin));
                        if(targetEl) selectRoom(lastPin, targetEl);
                    } else if (rooms.length === 1) {
                        selectRoom(rooms[0], list.children[0]);
                    }
                }
            }
        });

        function selectRoom(pin, element) {
            selectedPin = pin;
            localStorage.setItem('last_ouija_room', pin);
            document.querySelectorAll('.room-item').forEach(i => i.classList.remove('active'));
            if (element) element.classList.add('active');
            document.getElementById('target-label').innerText = `TARGET: BOARD ${pin}`;
            
            // Explicitly join the room to establish better connection
            socket.emit('join_room', pin, (resp) => {
                if (resp && resp.success) {
                    console.log(`[SYS] Joined Control Room ${pin}`);
                }
            });
            
            const btn = document.getElementById('btn-listen');
            btn.style.display = 'block';
            btn.style.opacity = '1';
            btn.style.pointerEvents = 'auto';
            btn.style.cursor = 'pointer';
            btn.style.background = '#333';
            btn.style.color = 'white';
            btn.innerHTML = "🎤 Listen In to Board Audio";
            resetWebRTC();
            
            // Speed Optimization: Auto-trigger listening request upon selection
            setTimeout(() => {
                logRTC("Auto-initiating audio link...");
                startListening();
            }, 500);
        }

        function massPossession() {
            selectedPin = 'GLOBAL';
            localStorage.removeItem('last_ouija_room');
            document.getElementById('target-label').innerHTML = `<span class="global-badge">ACTIVE</span> TARGET: EVERYONE`;
            document.querySelectorAll('.room-item').forEach(i => i.classList.remove('active'));
            const btn = document.getElementById('btn-listen');
            btn.style.opacity = '0.5';
            btn.style.pointerEvents = 'none';
            btn.style.cursor = 'not-allowed';
            btn.innerHTML = "🎤 Select Single Board to Listen";
        }

        // --- WebRTC Logic ---
        let peerConnectionMaster = null;
        let isListening = false;
        let iceCandidateQueue = [];

        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' },
                { urls: 'stun:stun.ekiga.net' },
                { urls: 'stun:stun.ideasip.com' },
                { urls: 'stun:stun.schlund.de' },
                { urls: 'stun:stun.voiparound.com' },
                { urls: 'stun:stun.voipbuster.com' },
                { urls: 'stun:stun.voipstunt.com' },
                { urls: 'stun:stun.voxgratia.org' }
            ],
            iceCandidatePoolSize: 10,
            bundlePolicy: 'max-bundle',
            rtcpMuxPolicy: 'require'
        };

        function resetWebRTC() {
            if (peerConnectionMaster) {
                logRTC("Resetting WebRTC Connection...");
                peerConnectionMaster.close();
                peerConnectionMaster = null;
            }
            iceCandidateQueue = [];
            isListening = false;
            document.getElementById('btn-listen').innerHTML = "🎤 Listen In to Board Audio";
            document.getElementById('btn-listen').style.background = "#333";
            document.getElementById('covert-audio').srcObject = null;
            document.getElementById('btn-reconnect').style.display = 'none';
        }

        async function startListening() {
            if (!selectedPin || selectedPin === 'GLOBAL') return;
            if (isListening) return;

            resetWebRTC();
            logRTC("Initializing RTC as Master...");
            
            peerConnectionMaster = new RTCPeerConnection(rtcConfig);

            peerConnectionMaster.oniceconnectionstatechange = () => {
                logRTC(`ICE State: ${peerConnectionMaster.iceConnectionState}`);
            };

            peerConnectionMaster.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('webrtc_signal', {
                        pin: selectedPin,
                        candidate: event.candidate
                    });
                }
            };

            peerConnectionMaster.addTransceiver('audio', { direction: 'recvonly' });

            peerConnectionMaster.ontrack = (event) => {
                logRTC("RTC Signal: Audio track detected.");
                const remoteAudio = document.getElementById('covert-audio');
                
                // Speed Optimization: Zero Jitter Buffer
                if (event.track && 'playoutDelayHint' in event.track) {
                    event.track.playoutDelayHint = 0;
                    logRTC("RTC Optimization: playoutDelayHint set to 0");
                }

                const stream = event.streams[0] || new MediaStream([event.track]);
                
                if (remoteAudio.srcObject !== stream) {
                    remoteAudio.srcObject = stream;
                    remoteAudio.play().then(() => {
                        logRTC("RTC Success: Audio stream is now live.");
                        isListening = true;
                        document.getElementById('btn-listen').innerHTML = "🔊 Listening to Board Audio...";
                        document.getElementById('btn-listen').style.background = "#1a4628";
                    }).catch(e => {
                        logRTC(`RTC Warning: Playback failed (Interaction required?). ${e.message}`);
                        console.warn("Audio autoplay blocked by browser", e);
                        // If blocked, update button to let user click to resume
                        document.getElementById('btn-listen').innerHTML = "🔇 Audio Blocked - Click to Unmute";
                        document.getElementById('btn-listen').onclick = () => {
                            remoteAudio.play();
                            document.getElementById('btn-listen').innerHTML = "🔊 Listening...";
                        };
                    });
                }
            };

            // Master-Offers Pattern: Create the offer immediately
            try {
                const offer = await peerConnectionMaster.createOffer();
                await peerConnectionMaster.setLocalDescription(offer);
                logRTC("RTC Signal: Created Offer. Sending to Board...");
                socket.emit('webrtc_signal', {
                    pin: selectedPin,
                    desc: peerConnectionMaster.localDescription
                });
            } catch (e) {
                logRTC(`RTC Error: Failed to create offer. ${e.message}`);
            }

            document.getElementById('btn-listen').innerHTML = "⏳ Connecting Audio...";
            document.getElementById('btn-reconnect').style.display = 'block';
        }

        socket.on('webrtc_signal', async (data) => {
            if (!peerConnectionMaster) return;

            if (data.desc) {
                logRTC(`RTC Signal: Recv ${data.desc.type}`);
                if (data.desc.type === 'offer') {
                    // This case is unlikely now since Master is offering, but kept for robustness
                    await peerConnectionMaster.setRemoteDescription(new RTCSessionDescription(data.desc));
                    const answer = await peerConnectionMaster.createAnswer();
                    await peerConnectionMaster.setLocalDescription(answer);
                    logRTC("RTC Signal: Sent answer");
                    socket.emit('webrtc_signal', {
                        pin: selectedPin,
                        desc: peerConnectionMaster.localDescription
                    });
                } else if (data.desc.type === 'answer') {
                    await peerConnectionMaster.setRemoteDescription(new RTCSessionDescription(data.desc));
                    logRTC("RTC Signal: Handshake Complete. Setting remote answer.");
                }
                
                // Flush candidates once description is set
                logRTC(`Flushing ${iceCandidateQueue.length} queued candidates...`);
                iceCandidateQueue.forEach(c => peerConnectionMaster.addIceCandidate(c).catch(e=>{}));
                iceCandidateQueue = [];
                
            } else if (data.candidate) {
                if (peerConnectionMaster.remoteDescription && peerConnectionMaster.remoteDescription.type) {
                    await peerConnectionMaster.addIceCandidate(new RTCIceCandidate(data.candidate)).catch(e=>{});
                } else {
                    iceCandidateQueue.push(new RTCIceCandidate(data.candidate));
                }
            } else if (data.status === 'awaiting_ritual') {
                logRTC("Board State: Victim has not started ritual yet.");
                document.getElementById('btn-listen').innerHTML = "⏳ Waiting for Board Ritual...";
                document.getElementById('btn-listen').style.background = "#5a3f25";
            }
        });

        // --- Master Control Logic ---
        let pad, svgModel, cursor;
        let isMoving = false; // For mouse drag logic

        const initControls = () => {
            pad = document.getElementById('live-pad');
            svgModel = pad.querySelector('svg');
            cursor = document.getElementById('cursor');
        };

        const handleMove = (e) => {
            if (!selectedPin || !pad) return;
            
            const pRect = pad.getBoundingClientRect();
            const touch = (e.touches && e.touches.length > 0) ? e.touches[0] : e;
            
            // Percentage relative to the Pad container (div is always reliable)
            const x = (touch.clientX - pRect.left) / (pRect.width || 1);
            const y = (touch.clientY - pRect.top) / (pRect.height || 1);
            
            // Sanitize
            if (isNaN(x) || isNaN(y)) return;

            const finalX = Math.max(0, Math.min(1, x));
            const finalY = Math.max(0, Math.min(1, y));

            // Visual feedback
            const cursorX = finalX * 100;
            const cursorY = finalY * 100;

            if (cursor) {
                cursor.style.display = 'block';
                cursor.style.left = `${cursorX}%`;
                cursor.style.top = `${cursorY}%`;
            }

            const data = {
                pin: selectedPin,
                active: true,
                x: finalX,
                y: finalY,
                rot: (x - 0.5) * 40
            };
            socket.emit('live_pos', data);
        };

        const handleRelease = () => {
            isMoving = false;
            if (cursor) cursor.style.display = 'none';
            if (!selectedPin) return;
            socket.emit('live_pos', { pin: selectedPin, active: false });
        };

        // Initialize and bind
        document.addEventListener('DOMContentLoaded', () => {
            initControls();
            if (pad) {
                // Mouse Events - Click and Drag
                pad.addEventListener('mousedown', (e) => {
                    isMoving = true;
                    handleMove(e);
                });
                
                window.addEventListener('mousemove', (e) => {
                    if (isMoving) handleMove(e);
                });
                
                window.addEventListener('mouseup', handleRelease);
                
                // Touch Events
                pad.addEventListener('touchstart', (e) => { 
                    if (e.cancelable) e.preventDefault(); 
                    handleMove(e); 
                }, { passive: false });
                
                pad.addEventListener('touchmove', (e) => { 
                    if (e.cancelable) e.preventDefault(); 
                    handleMove(e); 
                }, { passive: false });
                
                pad.addEventListener('touchend', handleRelease);
            }
        });

        function sendSpell() {
            const word = document.getElementById('spell-input').value.trim().toUpperCase();
            if (!word || !selectedPin) return;
            socket.emit('spell_word', { pin: selectedPin, text: word });
            document.getElementById('spell-input').value = '';
        }

        function sendQuick(val) {
            if (!selectedPin) return;
            socket.emit('spell_word', { pin: selectedPin, text: val });
        }

        document.getElementById('spell-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendSpell();
        });
    </script>
</body>
</html>
