<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced Mystical Ouija Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #030200;
            overflow: hidden;
            font-family: 'Cinzel Decorative', serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #board-container {
            position: relative;
            width: 95vw;
            max-width: 1100px;
            aspect-ratio: 1000 / 650;
            background-image: url('wood_bg.png');
            background-size: cover;
            background-position: center;
            box-shadow: inset 0 0 10vw rgba(0,0,0,0.95), 0 0 5vw rgba(0,0,0,0.8);
            border: 0.3vmin solid #1a0f05;
            border-radius: 2vmin;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        #board-container::after {
            content: '';
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 15vw #000;
            pointer-events: none;
            border-radius: 1.8vmin;
        }

        #ouija-board {
            width: 92%;
            height: 92%;
            filter: drop-shadow(0px 0.2vmin 0.2vmin rgba(0,0,0,0.8));
            z-index: 1;
        }

        .title {
            font-size: 7vmin;
            fill: #1a0f05;
            font-weight: bold;
            letter-spacing: 2.5vmin;
            text-shadow: 0.1vmin 0.1vmin 0px rgba(255,255,255,0.05), -0.1vmin -0.1vmin 0px rgba(0,0,0,0.9);
        }

        .word {
            font-size: 5vmin;
            fill: #1a0f05;
            font-weight: bold;
            text-shadow: 0.1vmin 0.1vmin 0px rgba(255,255,255,0.05), -0.1vmin -0.1vmin 0px rgba(0,0,0,0.9);
            cursor: pointer;
            transition: fill 0.3s, filter 0.3s;
        }

        .word:hover {
            fill: #ffb84d;
            filter: drop-shadow(0 0 1vmin rgba(255,184,77,0.8));
        }

        .alphabet, .numbers {
            font-size: 5vmin;
            fill: #1a0f05;
            font-weight: 900;
            stroke: #1a0f05;
            stroke-width: 0.1vmin;
            text-shadow: 0.15vmin 0.15vmin 0px rgba(255,255,255,0.05), -0.1vmin -0.1vmin 0px rgba(0,0,0,1);
        }

        .icon, .icon path, .icon circle {
            fill: #1a0f05;
            stroke: #1a0f05;
            filter: drop-shadow(-0.1vmin -0.1vmin 0px rgba(0,0,0,0.9)) drop-shadow(0.1vmin 0.1vmin 0px rgba(255,255,255,0.05));
        }

        #planchette {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12%;
            height: 23%;
            transform: translate(-50%, -50%);
            cursor: grab;
            z-index: 10;
        }

        #planchette.auto-move {
            transition: left 0.8s ease-in-out, top 0.8s ease-in-out, transform 0.8s ease-in-out;
        }

        #controls {
            margin-top: 3vh;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5vmin;
            z-index: 20;
            width: 90%;
        }

        button {
            background: linear-gradient(to bottom, #2a1508, #1a0f05);
            border: 0.2vmin solid #5a3f25;
            color: #cca470;
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.8vmin;
            min-font-size: 12px;
            font-weight: bold;
            padding: 1.2vmin 3vmin;
            border-radius: 0.8vmin;
            cursor: pointer;
            box-shadow: 0 0.5vmin 1.5vmin rgba(0,0,0,0.8);
            transition: all 0.3s;
            white-space: nowrap;
        }

        #question-input {
            background: rgba(0, 0, 0, 0.6);
            border: 0.2vmin solid #5a3f25;
            color: #ffd8a0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 2vmin;
            padding: 1.2vmin 2vmin;
            border-radius: 0.8vmin;
            outline: none;
            width: 40%;
            min-width: 150px;
            box-shadow: inset 0 0.2vmin 0.5vmin rgba(0,0,0,0.8);
        }

        #message-display {
            position: fixed;
            top: 5vh;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd8a0;
            font-size: 4vmin;
            letter-spacing: 0.8vmin;
            text-shadow: 0 0 1.5vmin rgba(255, 184, 77, 0.8);
            pointer-events: none;
            text-align: center;
            z-index: 20;
            height: 5vh;
        }

        @media (max-width: 600px) {
            #board-container {
                width: 98vw;
                border: none;
                border-radius: 0;
            }
            #controls {
                gap: 10px;
            }
            #question-input {
                width: 80%;
            }
            button {
                font-size: 14px;
                padding: 10px 20px;
            }
            .alphabet, .numbers {
                font-size: 4.5vmin;
            }
        }

        @media (orientation: portrait) {
            #board-container {
                width: 98vw;
            }
        }
    </style>
</head>
<body>
    <div id="board-container">
        <!-- Main Board SVG -->
        <svg id="ouija-board" viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <path id="curveAM" d="M 120 300 A 450 300 0 0 1 880 300" fill="transparent" />
                <path id="curveNZ" d="M 220 400 A 350 200 0 0 1 780 400" fill="transparent" />
                <path id="line10" d="M 150 480 L 850 480" fill="transparent" />
                <path id="curveGoodbye" d="M 250 580 A 250 50 0 0 0 750 580" fill="transparent"/>
                <filter id="glow-text">
                    <feGaussianBlur stdDeviation="2" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>
            
            <g class="board-graphics">
                <!-- Sun and Moon Settings -->
                <g class="icon sun" transform="translate(120, 115)">
                    <circle cx="0" cy="0" r="15" stroke="none" />
                    <path d="M 0 -22 L 0 -35 M 0 22 L 0 35 M -22 0 L -35 0 M 22 0 L 35 0 M -15 -15 L -25 -25 M 15 15 L 25 25 M -15 15 L -25 25 M 15 -15 L 25 -25" stroke-width="5" stroke-linecap="round" fill="none"/>
                </g>
                <g class="icon moon" transform="translate(880, 115) scale(0.8)">
                    <path d="M 0 -30 A 30 30 0 1 0 0 30 A 25 25 0 0 1 -10 15 A 5 5 0 0 0 -10 5 A 25 25 0 0 1 0 -30" stroke="none" />
                </g>

                <!-- TITLE -->
                <text x="500" y="90" class="title" text-anchor="middle">O U I J A</text>
                
                <!-- YES / NO -->
                <text x="220" y="160" class="word yes" text-anchor="middle">Y E S</text>
                <text x="780" y="160" class="word no" text-anchor="middle">N O</text>
                
                <!-- Alphabet -->
                <text class="alphabet" text-anchor="middle" letter-spacing="5">
                    <textPath href="#curveAM" startOffset="50%">A B C D E F G H I J K L M N</textPath>
                </text>
                <text class="alphabet" text-anchor="middle" letter-spacing="5">
                    <textPath href="#curveNZ" startOffset="50%">O P Q R S T U V W X Y Z</textPath>
                </text>
                
                <!-- Numbers -->
                <text class="numbers" text-anchor="middle" letter-spacing="10">
                    <textPath href="#line10" startOffset="50%">1 2 3 4 5 6 7 8 9 0</textPath>
                </text>
                
                <!-- GOOD BYE -->
                <text class="word goodbye" text-anchor="middle" letter-spacing="5">
                    <textPath href="#curveGoodbye" startOffset="50%">G O O D B Y E</textPath>
                </text>
            </g>
        </svg>

        <!-- Planchette Element -->
        <div id="planchette">
            <svg viewBox="0 0 200 250" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <pattern id="planchette-wood" patternUnits="userSpaceOnUse" width="400" height="400">
                        <image href="wood_bg.png" x="-100" y="-100" width="500" height="500" preserveAspectRatio="xMidYMid slice" />
                    </pattern>
                    <filter id="shadow">
                        <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000" flood-opacity="0.9"/>
                    </filter>
                    <filter id="hole-glow">
                        <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ffcc66" flood-opacity="0.8"/>
                    </filter>
                    <mask id="hole-mask">
                        <rect width="200" height="250" fill="white" />
                        <circle cx="100" cy="180" r="35" fill="black" />
                    </mask>
                </defs>
                
                <!-- Planchette Body -->
                <path class="planchette-shape" filter="url(#shadow)" mask="url(#hole-mask)" d="M 100 10 C 150 150, 190 200, 180 240 C 170 250, 30 250, 20 240 C 10 200, 50 150, 100 10 Z" fill="url(#planchette-wood)" stroke="#1a0f05" stroke-width="3"/>
                
                <!-- Inner Window (Hole) Borders -->
                <circle cx="100" cy="180" r="35" fill="transparent" stroke="#1a0f05" stroke-width="4" filter="url(#hole-glow)"/>
                <circle cx="100" cy="180" r="38" fill="transparent" stroke="rgba(0,0,0,0.8)" stroke-width="2"/>
                
                <!-- Decorative lines -->
                <path d="M 100 30 L 100 120 M 70 80 L 130 80" stroke="#1a0f05" stroke-width="2" fill="transparent" opacity="0.6"/>
            </svg>
        </div>
    </div>
    
    <!-- Controls and Text Message -->
    <div id="controls">
        <input type="text" id="question-input" placeholder="Ask the spirits..." autocomplete="off">
        <button id="ask-btn">Ask</button>
        <button id="auto-btn">Random</button>
        <button id="reset-btn">Rest</button>
    </div>
    <div style="text-align: center; color: rgba(255,255,255,0.3); font-family: monospace; margin-top: 10px;">
        <span id="room-code">Generating Room Code...</span>
    </div>

    <div id="message-display"></div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        // Use a unique prefix to prevent collisions on the public PeerServer
        const ID_PREFIX = "spirit-sync-";
        const roomPin = Math.floor(1000 + Math.random() * 9000).toString();
        const peerId = `${ID_PREFIX}${roomPin}`;

        const peerConfig = {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    { urls: 'stun:stun3.l.google.com:19302' },
                    { urls: 'stun:stun4.l.google.com:19302' },
                    { urls: 'stun:global.stun.twilio.com:3478?transport=udp' }
                ]
            }
        };

        const peer = new Peer(peerId, peerConfig);

        peer.on('open', (id) => {
            document.getElementById('room-code').innerText = `Room Code: ${roomPin} (Connected to Cloud)`;
        });

        // Remote Command Listener via PeerJS
        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if (data === 'ping') {
                    conn.send('pong');
                    return;
                }
                const boardEv = new CustomEvent('remote-data', { detail: data });
                document.dispatchEvent(boardEv);
            });
        });

        document.addEventListener('DOMContentLoaded', () => {
            const planchette = document.getElementById('planchette');
            const container = document.getElementById('board-container');
            const autoBtn = document.getElementById('auto-btn');
            const resetBtn = document.getElementById('reset-btn');
            const msgDisplay = document.getElementById('message-display');
            const svgBoard = document.getElementById('ouija-board');
            const questionInput = document.getElementById('question-input');
            const askBtn = document.getElementById('ask-btn');

            let isDragging = false;
            let autoMode = false;
            let liveMode = false;
            let activeMoveTimeout = null;

            // Coordinates cache
            let startX = 0, startY = 0, initialLeft = 0, initialTop = 0;

            // Reset Planchette to center gracefully
            const initPos = () => {
                const rect = container.getBoundingClientRect();
                planchette.classList.add('auto-move');
                planchette.style.left = `${rect.width / 2}px`;
                planchette.style.top = `${rect.height / 2 + 80}px`;
                planchette.style.transform = `translate(-50%, -50%) rotate(0deg)`;
                
                setTimeout(() => {
                    if(!autoMode) {
                        planchette.classList.remove('auto-move');
                    }
                }, 800);
                
                msgDisplay.textContent = "";
            };

            setTimeout(initPos, 200);

            // Grab Planchette
            const onPointerDown = (e) => {
                if(autoMode) return;
                isDragging = true;
                planchette.style.transition = 'none'; // remove transition for smooth dragging
                
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                
                startX = clientX;
                startY = clientY;
                
                initialLeft = parseFloat(planchette.style.left) || container.clientWidth / 2;
                initialTop = parseFloat(planchette.style.top) || container.clientHeight / 2;

                e.preventDefault();
            };

            // Drag Planchette
            const onPointerMove = (e) => {
                if (!isDragging) return;
                
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                
                const dx = clientX - startX;
                const dy = clientY - startY;
                
                let newLeft = initialLeft + dx;
                let newTop = initialTop + dy;
                
                const pRect = planchette.getBoundingClientRect();
                const cRect = container.getBoundingClientRect();
                
                // Boundaries
                if(newLeft < pRect.width/2) newLeft = pRect.width/2;
                if(newLeft > cRect.width - pRect.width/2) newLeft = cRect.width - pRect.width/2;
                if(newTop < pRect.height/2) newTop = pRect.height/2;
                if(newTop > cRect.height - pRect.height/2) newTop = cRect.height - pRect.height/2;
                
                // Rotational effect based on lateral motion
                const rotation = (dx * 0.05);
                
                planchette.style.left = `${newLeft}px`;
                planchette.style.top = `${newTop}px`;
                planchette.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;
            };

            // Release Planchette
            const onPointerUp = () => {
                if(isDragging) {
                    isDragging = false;
                    planchette.style.transition = 'transform 0.4s ease-out';
                    planchette.style.transform = `translate(-50%, -50%) rotate(0deg)`;
                }
            };

            planchette.addEventListener('mousedown', onPointerDown);
            document.addEventListener('mousemove', onPointerMove);
            document.addEventListener('mouseup', onPointerUp);

            planchette.addEventListener('touchstart', onPointerDown, {passive: false});
            document.addEventListener('touchmove', onPointerMove, {passive: false});
            document.addEventListener('touchend', onPointerUp);

            // Mathematical Mapping of Letters to inner SVG viewBox (1000x650)
            const targets = {
                'YES': {x: 220, y: 105},
                'NO': {x: 780, y: 105},
                'GOODBYE': {x: 500, y: 525}
            };
            
            // Function to calculate exact point on an SVG path safely
            const getPathPoint = (pathId, percentage) => {
                const path = document.getElementById(pathId);
                if(!path) return {x:0, y:0};
                const length = path.getTotalLength();
                return path.getPointAtLength(length * percentage);
            };

            // A-N Mapping (14 characters, center 50%) -> roughly 15% to 85% of path
            const amArr = "ABCDEFGHIJKLMN".split("");
            amArr.forEach((c, i) => {
                let pct = 0.22 + (0.56 / 13) * i; 
                let pt = getPathPoint('curveAM', pct);
                targets[c] = {x: pt.x, y: pt.y - 55}; 
            });

            const nzArr = "OPQRSTUVWXYZ".split("");
            nzArr.forEach((c, i) => {
                let pct = 0.18 + (0.64 / 11) * i;
                let pt = getPathPoint('curveNZ', pct);
                targets[c] = {x: pt.x, y: pt.y - 55};
            });
            
            const numArr = "1234567890".split("");
            numArr.forEach((c, i) => {
                let pct = 0.25 + (0.50 / 9) * i; 
                let pt = getPathPoint('line10', pct);
                targets[c] = {x: pt.x, y: pt.y - 55};
            });

            // Animate Planchette to Target
            const moveToTarget = (svgX, svgY) => {
                const svgRect = svgBoard.getBoundingClientRect();
                // Container rect needed because planchette absolute positioning is relative to container
                const contRect = container.getBoundingClientRect();
                
                const scaleX = svgRect.width / 1000;
                const scaleY = svgRect.height / 650;
                
                let targetX = (svgRect.left - contRect.left) + svgX * scaleX;
                let targetY = (svgRect.top - contRect.top) + svgY * scaleY;

                planchette.classList.add('auto-move');
                
                // Random organic offset
                targetX += (Math.random() - 0.5) * 8;
                targetY += (Math.random() - 0.5) * 8;
                let rotation = (Math.random() - 0.5) * 15;

                planchette.style.left = `${targetX}px`;
                planchette.style.top = `${targetY}px`;
                planchette.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;
            };

            const sleep = (ms) => new Promise(r => setTimeout(r, ms));

            // Spelling Routine
            const spellMessage = async (msg) => {
                autoMode = true;
                msgDisplay.textContent = "";
                const words = msg.toUpperCase().split(' ');
                
                for (let word of words) {
                    if (targets[word]) { // Known solid words
                        moveToTarget(targets[word].x, targets[word].y);
                        await sleep(1500);
                        msgDisplay.textContent += word;
                    } else {
                        for (let char of word) {
                            if (targets[char]) {
                                moveToTarget(targets[char].x, targets[char].y);
                                await sleep(1200);
                                msgDisplay.textContent += char;
                            }
                        }
                    }
                    msgDisplay.textContent += " ";
                    await sleep(1000);
                }
                
                if (msg !== 'GOODBYE') {
                    await sleep(1000);
                    moveToTarget(targets['GOODBYE'].x, targets['GOODBYE'].y);
                }
                
                activeMoveTimeout = setTimeout(() => {
                    autoMode = false;
                    initPos();
                }, 2000);
            };

            // Unified Remote Data Handler
            document.addEventListener('remote-data', (e) => {
                const data = e.detail;
                if (data && data.type === 'live') {
                    // High-frequency live tracking (Possession Mode)
                    autoMode = false;
                    liveMode = true; 
                    clearTimeout(activeMoveTimeout);
                    
                    const rect = container.getBoundingClientRect();
                    const targetX = data.x * rect.width;
                    const targetY = data.y * rect.height;
                    
                    planchette.style.left = `${targetX}px`;
                    planchette.style.top = `${targetY}px`;
                    planchette.style.transform = `translate(-50%, -50%) rotate(${data.rot || 0}deg)`;
                } else if (data && data.text) {
                    // Standard spelling command
                    liveMode = false;
                    spellMessage(data.text);
                } else if (data === null) {
                    // Reset signal
                    autoMode = false;
                    liveMode = false;
                    clearTimeout(activeMoveTimeout);
                    initPos();
                }
            });

            const handleQuestion = async () => {
                if(autoMode) return;
                const question = questionInput.value.trim();
                if(!question) return;
                
                questionInput.value = "";
                questionInput.disabled = true;
                
                const answers = [
                     "YES", "NO", "MAYBE", "DEATH", "RUN", "SOON", "NEVER", "UNKNOWN", 
                     "IT IS CERTAIN", "DO NOT ASK", "I CANNOT SAY", "THE SPIRITS LAUGH", "666"
                ];
                const msg = answers[Math.floor(Math.random() * answers.length)];
                
                // Short pause before the spirit answers
                await sleep(1000);
                await spellMessage(msg);
                
                questionInput.disabled = false;
            };

            askBtn.addEventListener('click', handleQuestion);
            questionInput.addEventListener('keypress', (e) => {
                if(e.key === 'Enter') handleQuestion();
            });

            // Button Events
            autoBtn.addEventListener('click', () => {
                if(autoMode) return;
                const messages = [
                     "HELLO", "GHOST", "I SEE YOU", "NO", "RUN", "YES", "SPIRIT", "DEATH",
                     "BEHIND YOU", "666", "HELP", "DARKNESS", "SOUL", "DEMON", "ALONE", "COLD"
                ];
                const msg = messages[Math.floor(Math.random() * messages.length)];
                spellMessage(msg);
            });

            resetBtn.addEventListener('click', () => {
                autoMode = false;
                clearTimeout(activeMoveTimeout);
                initPos();
            });

            // Make 'YES', 'NO', 'GOODBYE' clickable on the SVG
            document.querySelector('.word.yes').addEventListener('click', () => { if(!autoMode) spellMessage('YES'); });
            document.querySelector('.word.no').addEventListener('click', () => { if(!autoMode) spellMessage('NO'); });
            document.querySelector('.word.goodbye').addEventListener('click', () => { if(!autoMode) spellMessage('GOODBYE'); });
            
            window.addEventListener('resize', () => {
                if (!autoMode && !isDragging) {
                    initPos();
                }
            });

        });
    </script>
</body>
</html>
